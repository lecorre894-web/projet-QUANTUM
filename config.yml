version: 2.1

jobs:
  quantum-bbb-runtime-check:
    docker:
      - image: cimg/node:20.11
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Node syntax check
          command: node -c app.js
      - run:
          name: Runtime smoke test
          command: timeout 20s node app.js || true

workflows:
  version: 2
  quantum-bbb-workflow:
    jobs:
      - quantum-bbb-runtime-check
